<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rubik's Cube</title>
  <link rel="stylesheet" href="/static/style.css?v10">
</head>
<div id="alert-modal" class="modal-overlay">
  <div class="modal-box">
    <p class="modal-label">notice</p>
    <p id="alert-modal-message" class="modal-message"></p>
    <button id="alert-modal-ok" class="modal-btn">ok</button>
  </div>
</div>
<div id="win-modal" class="modal-overlay">
  <div class="modal-box">
    <p class="modal-label">PUZZLE SOLVED</p>
    <p id="win-message" class="modal-message"></p>
    <p id="win-sub" style="color:#555; font-family:monospace; font-size:11px; margin-top:-4px;"></p>
    <button id="win-ok" class="modal-btn">nice ✓</button>

    <div id="share-menu" hidden>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:4px;">
        <button class="modal-btn modal-btn--cancel" onclick="shareTo('x')">X</button>
        <button class="modal-btn modal-btn--cancel" onclick="shareTo('linkedin')">LinkedIn</button>
        <button class="modal-btn modal-btn--cancel" onclick="shareTo('whatsapp')">WhatsApp</button>
        <button class="modal-btn modal-btn--cancel" onclick="shareTo('telegram')">Telegram</button>
      </div>
    </div>
    <button id="btn-share" onclick="shareResult()" class="modal-btn modal-btn--cancel" disabled>
      🔗 share result
    </button>
  </div>
</div>
<div id="nickname-modal"
  style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); align-items:center; justify-content:center;">
  <div
    style="background:#1a1a1a; border:0.5px solid rgba(255,255,255,0.1); border-radius:16px; padding:28px 24px; width:320px; display:flex; flex-direction:column; gap:16px;">
    <p style="color:#fff; font-family:monospace; font-size:13px; letter-spacing:0.05em;">ENTER NICKNAME</p>
    <p style="color:#555; font-family:monospace; font-size:11px; margin-top:-8px;">Your name will appear on the
      leaderboard</p>
    <input id="nickname-input" type="text" maxlength="20" placeholder="e.g. speedcuber42"
      style="background:#111; border:0.5px solid rgba(255,255,255,0.12); border-radius:8px; color:#fff; font-family:monospace; font-size:14px; padding:10px 12px; outline:none; width:100%;" />
    <div style="display:flex; gap:8px;">
      <button id="nickname-cancel"
        style="flex:1; padding:10px; background:#1e1e1e; border:0.5px solid rgba(255,255,255,0.09); border-radius:8px; color:#666; font-family:monospace; font-size:12px; cursor:pointer;">cancel</button>
      <button id="nickname-ok"
        style="flex:2; padding:10px; background:#1a2a1a; border:0.5px solid rgba(80,180,80,0.3); border-radius:8px; color:#5a9; font-family:monospace; font-size:12px; cursor:pointer;">confirm
        ↵</button>
    </div>
  </div>
</div>

<body>
  <div id="stats-panel">

    <span class="app-title">Rubik's cube</span>

    <hr class="divider">
    <div id="leaderboard-filters">
      <button id="filter-all" class="filter-btn filter-btn--active" onclick="setLeaderboardFilter('all')">all
        time</button>
      <button id="filter-today" class="filter-btn" onclick="setLeaderboardFilter('today')">today</button>
    </div>
    <div id="leaderboard"></div>

    <div id="leaderboard"></div>
  </div>

  <div id="controls-panel">

    <div class="panel-label">cube control
      <button id="theme-toggle" onclick="toggleTheme()"
        style="float:right; width:auto; padding:2px 8px; font-size:10px;">
        ☀ light
      </button>
    </div>
    <div id="moves-grid">
      <div class="btn-pair"><span class="face-label">U</span><button onclick="doMove(0)">U</button><button
          onclick="doMove(1)" class="prime">U'</button></div>
      <div class="btn-pair"><span class="face-label">D</span><button onclick="doMove(2)">D</button><button
          onclick="doMove(3)" class="prime">D'</button></div>
      <div class="btn-pair"><span class="face-label">F</span><button onclick="doMove(4)">F</button><button
          onclick="doMove(5)" class="prime">F'</button></div>
      <div class="btn-pair"><span class="face-label">B</span><button onclick="doMove(6)">B</button><button
          onclick="doMove(7)" class="prime">B'</button></div>
      <div class="btn-pair"><span class="face-label">L</span><button onclick="doMove(8)">L</button><button
          onclick="doMove(9)" class="prime">L'</button></div>
      <div class="btn-pair"><span class="face-label">R</span><button onclick="doMove(10)">R</button><button
          onclick="doMove(11)" class="prime">R'</button></div>
    </div>

    <hr class="divider">

    <div id="action-row">
      <button id="btn-reset" onclick="setCompeting(false); doReset()">↺ reset</button>
      <button id="solve-btn">✨ Solve</button>
      <button id="btn-undo" onclick="doUndo()">↩ undo</button>
      <button id="btn-redo" onclick="doRedo()">↪ redo</button>
    </div>
  </div>
  <div id="history-panel">

    <div class="move-history">
      <div class="move-history-header">
        <span>Moves</span>
        <span id="move-history-count">0</span>
      </div>
      <div id="move-history-list" class="move-history-list">
        <span class="history-empty">No moves yet</span>
      </div>
    </div>
  </div>
  <div id="compete-panel">
    <div id="nickname-tag"></div>
    <hr class="divider">
    <div id="timer-display">--:--:--</div>
    <div id="move-counter">moves: <span id="count">-</span></div>
    <hr class="divider">
    <button id="btn-scramble" onclick="setCompeting(true); doScramble()">⚡ compete</button>

  </div>
  <button id="camera-home-btn" onclick="resetCameraView()" title="Reset camera">⌂</button>
  <div id="snapshot-controls">
    <button id="snapshot-btn" title="Snapshots">💾</button>
    <div id="snapshot-tree" hidden>
      <button id="snapshot-create-btn" onclick="createSnapshot()">+ save snapshot</button>
    </div>
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module" src="/static/cube.js?v10"></script>
</body>

</html>
