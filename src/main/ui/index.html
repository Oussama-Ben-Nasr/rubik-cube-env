<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rubik's Cube</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="sidebar">
  <span class="app-title">Rubik's cube</span>
  <div id="timer-display">--:--:--</div>
  <div id="move-counter">moves: <span id="count">-</span></div>

  <hr class="divider">

  <div id="leaderboard"></div>

  <hr class="divider">

  <div class="panel-label">moves</div>
  <div id="moves-grid">
    <div class="btn-pair"><span class="face-label">U</span><button onclick="doMove(0)">U</button><button onclick="doMove(1)" class="prime">U'</button></div>
    <div class="btn-pair"><span class="face-label">D</span><button onclick="doMove(2)">D</button><button onclick="doMove(3)" class="prime">D'</button></div>
    <div class="btn-pair"><span class="face-label">F</span><button onclick="doMove(4)">F</button><button onclick="doMove(5)" class="prime">F'</button></div>
    <div class="btn-pair"><span class="face-label">B</span><button onclick="doMove(6)">B</button><button onclick="doMove(7)" class="prime">B'</button></div>
    <div class="btn-pair"><span class="face-label">L</span><button onclick="doMove(8)">L</button><button onclick="doMove(9)" class="prime">L'</button></div>
    <div class="btn-pair"><span class="face-label">R</span><button onclick="doMove(10)">R</button><button onclick="doMove(11)" class="prime">R'</button></div>
  </div>

  <hr class="divider">

  <div id="action-row">
    <button id="btn-reset" onclick="doReset()">↺ reset</button>
    <button id="btn-scramble" onclick="doScramble()">⚡ compete</button>
    <button id="btn-undo" onclick="doUndo()">↩ undo</button>
    <button id="btn-redo" onclick="doRedo()">↪ redo</button>
    <button id="btn-share" onclick="shareResult()" disabled>📤 share</button>
    <div id="share-menu" hidden>
    <button onclick="shareTo('x')">X</button>
    <button onclick="shareTo('linkedin')">LinkedIn</button>
    <button onclick="shareTo('whatsapp')">WhatsApp</button>
    <button onclick="shareTo('telegram')">Telegram</button>
</div>
</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>

<script type="module" src="/static/cube.js"></script>
</body>
</html>
