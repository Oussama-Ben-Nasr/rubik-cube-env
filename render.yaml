services:
  - type: web
    name: fastapi-uv-backend
    runtime: python
    plan: free
    region: frankfurt

    buildCommand: "pip install uv && uv sync --no-dev"

    startCommand: "uv run uvicorn src.main.api.render:app --host 0.0.0.0 --port $PORT"
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.14"

      - key: WEB_CONCURRENCY
        value: "1"

      - key: PORT
        value: "8000"

      # - key: DATABASE_URL
      #   sync: false # Forces you to type it safely inside the Render UI
