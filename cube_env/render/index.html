<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rubik Cube</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div id="ui">
    <button onclick="move(0)">U</button>
    <button onclick="move(1)">U'</button>
    <button onclick="move(2)">D</button>
    <button onclick="move(3)">D'</button>
    <button onclick="move(4)">F</button>
    <button onclick="move(5)">F'</button>
    <button onclick="move(6)">B</button>
    <button onclick="move(7)">B'</button>
    <button onclick="move(8)">L</button>
    <button onclick="move(9)">L'</button>
    <button onclick="move(10)">R</button>
    <button onclick="move(11)">R'</button>
    <button onclick="reset()">Reset</button>
</div>

<div id="app"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>

<script type="module" src="/static/cube.js"></script>

</body>
</html>
