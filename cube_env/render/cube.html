<!DOCTYPE html>
<html>

<head>
  <title>Render cube</title>
  <link rel="stylesheet" href="./cube.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
</head>

<body>

  <div id="wrapper">
    <div class="viewport">
      <div class="cube">
        <div class="side">
          <div id="cell4" class="one center">1</div>
          <div id="cell1" class="one top"></div>
          <div id="cell7" class="one bottom"></div>
          <div id="cell5" class="one right"></div>
          <div id="cell3" class="one left"></div>
          <div id="cell2" class="one top right"></div>
          <div id="cell0" class="one top left"></div>
          <div id="cell8" class="one bottom right"></div>
          <div id="cell6" class="one bottom left"></div>
        </div>
        <div class="side">
          <div id="cell31" class="two center">2</div>
          <div id="cell28" class="two top"></div>
          <div id="cell34" class="two bottom"></div>
          <div id="cell32" class="two right"></div>
          <div id="cell30" class="two left"></div>
          <div id="cell29" class="two top right"></div>
          <div id="cell27" class="two top left"></div>
          <div id="cell35" class="two bottom right"></div>
          <div id="cell33" class="two bottom left"></div>
        </div>
        <div class="side">
          <div id="cell22" class="three center">3</div>
          <div id="cell19" class="three top"></div>
          <div id="cell25" class="three bottom"></div>
          <div id="cell23" class="three right"></div>
          <div id="cell21" class="three left"></div>
          <div id="cell20" class="three top right"></div>
          <div id="cell18" class="three top left"></div>
          <div id="cell26" class="three bottom right"></div>
          <div id="cell24" class="three bottom left"></div>
        </div>
        <div class="side">
          <div id="cell40" class="four center">4</div>
          <div id="cell37" class="four top"></div>
          <div id="cell43" class="four bottom"></div>
          <div id="cell41" class="four right"></div>
          <div id="cell39" class="four left"></div>
          <div id="cell38" class="four top right"></div>
          <div id="cell36" class="four top left"></div>
          <div id="cell44" class="four bottom right"></div>
          <div id="cell42" class="four bottom left"></div>
        </div>
        <div class="side">
          <div id="cell49" class="five center">5</div>
          <div id="cell46" class="five top"></div>
          <div id="cell52" class="five bottom"></div>
          <div id="cell47" class="five right"></div>
          <div id="cell45" class="five left"></div>
          <div id="cell50" class="five top right"></div>
          <div id="cell48" class="five top left"></div>
          <div id="cell53" class="five bottom right"></div>
          <div id="cell51" class="five bottom left"></div>
        </div>
        <div class="side">
          <div id="cell13" class="six center">6</div>
          <div id="cell10" class="six top"></div>
          <div id="cell16" class="six bottom"></div>
          <div id="cell14" class="six right"></div>
          <div id="cell12" class="six left"></div>
          <div id="cell11" class="six top right"></div>
          <div id="cell9" class="six top left"></div>
          <div id="cell17" class="six bottom right"></div>
          <div id="cell15" class="six bottom left"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="./cube.js"></script>
  <script type="text/javascript" src="./color_cube.js"></script>
</body>

</html>
<!--
  In the solved state we have the following mapping
state     :  0 3 1 5 4 2
cube face :  1 2 6 4 5 3
color     :  r w o y g b
             e i r e r l
             d t a l e u
               e n l e e
                 g o n
                 e w
  cellx >-> state[x div 9][x mod 9]
-->
